name: 🚀 Deploy Medical Assistant

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: 📦 Install dependencies & build
        run: |
          npm ci
          npm run build

      - name: 📦 Install sshpass
        run: sudo apt-get update -qq && sudo apt-get install -y -qq sshpass

      # ─── 部署前端 ───
      - name: 🚀 Deploy frontend
        run: |
          sshpass -p "${{ secrets.SERVER_PASSWORD }}" \
            scp -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
            -r dist/* ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }}:/var/www/medical/

      # ─── 部署后端 ───
      - name: 🚀 Deploy backend
        run: |
          sshpass -p "${{ secrets.SERVER_PASSWORD }}" \
            scp -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
            -r server/* ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }}:/opt/medical-server/

      # ─── 服务器端配置 ───
      - name: 🔄 Configure server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            # ── 前端权限 ──
            mkdir -p /var/www/medical
            chown -R www-data:www-data /var/www/medical
            chmod -R 755 /var/www/medical
            echo "📁 Frontend files:"
            ls -la /var/www/medical/
            ls -la /var/www/medical/assets/ || echo "⚠️ assets dir missing!"

            # ── 后端配置 ──
            cd /opt/medical-server
            cat > .env << 'EOF'
            VOLC_AK=${{ secrets.VOLC_AK }}
            VOLC_SK=${{ secrets.VOLC_SK }}
            VOLC_REGION=cn-north-1
            PORT=3001
            EOF
            npm install --production

            # systemd service
            if [ ! -f /etc/systemd/system/medical-backend.service ]; then
              cp medical-backend.service /etc/systemd/system/
              systemctl daemon-reload
              systemctl enable medical-backend
            fi
            systemctl restart medical-backend

            # ── Nginx 配置 ──
            cat > /etc/nginx/sites-available/medical << 'EOF'
            server {
                listen 8050;
                server_name _;

                location /api/ {
                    proxy_pass http://127.0.0.1:3001;
                    proxy_http_version 1.1;
                    proxy_set_header Host $host;
                    proxy_set_header X-Real-IP $remote_addr;
                    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                    proxy_read_timeout 60s;
                    proxy_connect_timeout 60s;
                    client_max_body_size 20M;
                }

                location / {
                    root /var/www/medical;
                    index index.html;
                    try_files $uri $uri/ /index.html;
                }

                location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
                    expires 1M;
                    add_header Cache-Control "public, immutable";
                }

                gzip on;
                gzip_types text/plain text/css application/javascript application/json;
            }
            EOF

            ln -sf /etc/nginx/sites-available/medical /etc/nginx/sites-enabled/medical
            rm -f /etc/nginx/sites-enabled/default 2>/dev/null || true

            # SELinux 修复（如果有）
            if command -v getenforce &>/dev/null && [ "$(getenforce)" = "Enforcing" ]; then
              setenforce 0 2>/dev/null || true
              chcon -Rt httpd_sys_content_t /var/www/medical 2>/dev/null || true
            fi

            nginx -t && systemctl restart nginx
            echo ""
            echo "✅ Deployment complete!"
