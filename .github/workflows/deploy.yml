name: 🚀 Deploy Medical Assistant

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      # 1. 检出代码
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      # 2. 设置 Node.js
      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      # 3. 安装前端依赖并构建
      - name: 📦 Install frontend dependencies
        run: npm ci

      - name: 🔨 Build frontend
        run: npm run build

      # 4. 打包前端为 tar.gz（确保目录结构完整）
      - name: 📦 Archive frontend
        run: tar -czf frontend.tar.gz -C dist .

      # 5. 打包后端为 tar.gz
      - name: 📦 Archive backend
        run: tar -czf backend.tar.gz -C server .

      # 6. 上传前端 tar 包并解压部署
      - name: 🚀 Deploy frontend
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          source: "frontend.tar.gz"
          target: "/var/www/medical"

      - name: 🚀 Extract frontend
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            cd /var/www/medical
            rm -rf *
            tar -xzf frontend.tar.gz
            rm frontend.tar.gz
            ls -la
            ls -la assets/

      # 7. 上传后端 tar 包并解压部署
      - name: 🚀 Deploy backend
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          source: "backend.tar.gz"
          target: "/opt/medical-server"

      - name: 🚀 Extract backend
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            cd /opt/medical-server
            rm -rf *.js *.json *.service .env node_modules
            tar -xzf backend.tar.gz
            rm backend.tar.gz

            # 创建 .env 文件
            echo "VOLC_AK=${{ secrets.VOLC_AK }}" > .env
            echo "VOLC_SK=${{ secrets.VOLC_SK }}" >> .env
            echo "VOLC_REGION=cn-north-1" >> .env
            echo "PORT=3001" >> .env

            # 安装依赖
            npm install --production

            # 确保 systemd service 存在
            if [ ! -f /etc/systemd/system/medical-backend.service ]; then
              cp medical-backend.service /etc/systemd/system/
              systemctl daemon-reload
              systemctl enable medical-backend
            fi

            # 启动/重启后端
            systemctl restart medical-backend
            systemctl status medical-backend --no-pager

            # 更新 Nginx 配置
            cat > /etc/nginx/sites-available/medical << 'NGINX_EOF'
            server {
                listen 8050;
                server_name _;

                location /api/ {
                    proxy_pass http://127.0.0.1:3001;
                    proxy_http_version 1.1;
                    proxy_set_header Host $host;
                    proxy_set_header X-Real-IP $remote_addr;
                    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                    proxy_read_timeout 60s;
                    proxy_connect_timeout 60s;
                    client_max_body_size 20M;
                }

                location / {
                    root /var/www/medical;
                    index index.html;
                    try_files $uri $uri/ /index.html;
                }

                location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
                    expires 1M;
                    add_header Cache-Control "public, immutable";
                }

                gzip on;
                gzip_types text/plain text/css application/javascript application/json;
            }
            NGINX_EOF

            ln -sf /etc/nginx/sites-available/medical /etc/nginx/sites-enabled/medical
            nginx -t && systemctl restart nginx

            echo ""
            echo "✅ Deployment complete!"
            echo "📍 Frontend: http://${{ secrets.SERVER_IP }}:8050"
